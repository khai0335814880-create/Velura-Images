<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Stylist Chatbot — Velura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="page-chatbot">

  <!-- BỔ SUNG: OVERLAY LỊCH SỬ TRÒ CHUYỆN -->
  <div class="chatbot-history-overlay">
    <!-- Nội dung sẽ được JavaScript tự động điền -->
  </div>

  <div class="page-shell">
    <!-- SITE HEADER -->
    <load src="/src/components/header.html" />

    <!-- MAIN CHATBOT PAGE CONTENT -->
    <main>
      <div class="chatbot-page">
        <!-- Sidebar for Recommendations -->
        <aside class="chatbot-page__sidebar">
          <h3 class="chatbot-sidebar-title">Gợi ý sản phẩm</h3>
          <div class="chatbot-recommendations js-chatbot-recommendations">
            <!-- Rendered dynamically via JavaScript based on mode -->
          </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chatbot-page__main">
          <div class="chatbot-box chatbot-box--page">
            <div class="chatbot-header">
              <div class="chatbot-header__info">
                <div class="chatbot-header__avatar">
                  <img src="/src/assets/images/chatbot/bot-avatar.png" alt="Velura Assistant" />
                  <span class="chatbot-header__status"></span>
                </div>
                <div>
                  <h4 class="chatbot-header__title">AI Stylist — Velura</h4>
                  <span class="chatbot-header__desc">Trực tuyến</span>
                </div>
              </div>

              <!-- CẬP NHẬT: THÊM NÚT 3 GẠCH VÀO HEADER -->
              <div class="chatbot-state-switcher" style="display: flex; align-items: center; gap: 12px;">
                <select class="js-chatbot-state-select" aria-label="Chọn trạng thái kiểm thử">
                  <option value="guest">Guest Mode</option>
                  <option value="user">User Mode</option>
                </select>
                <!-- BỔ SUNG: NÚT 3 GẠCH -->
                <button class="js-menu-chatbot-trigger" type="button" aria-label="Lịch sử trò chuyện"
                  style="background: transparent; border: none; cursor: pointer; color: white; padding: 0; display: flex;">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                  </svg>
                </button>
              </div>
            </div>

            <div class="chatbot-messages">
              <!-- Rendered dynamically -->
            </div>

            <!-- CẬP NHẬT: THÊM NÚT ĐÍNH KÈM VÀ INPUT FILE -->
            <form class="chatbot-input-area js-chatbot-form" data-prevent-submit>

              <!-- BỔ SUNG: NÚT ĐÍNH KÈM ẢNH -->
              <button class="chatbot-attach-btn" type="button" aria-label="Đính kèm ảnh">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
              </button>
              <input type="file" id="img-input" accept="image/*" hidden />

              <input class="chatbot-input js-chatbot-input" type="text" placeholder="Viết tin nhắn..."
                aria-label="Nội dung chat" />
              <button class="chatbot-send-btn" type="submit" aria-label="Gửi tin nhắn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </form>

            <!-- BỔ SUNG: Dòng cảnh báo giống thiết kế Figma -->
            <div
              style="text-align: center; padding: 8px 16px 16px; font-size: 0.6875rem; color: var(--text-secondary); background: #fff; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;">
              AI chỉ mang tính chất tham khảo nên nếu thắc mắc hãy liên hệ trực tiếp cho chúng mình nhé
            </div>

          </div>
        </div>
      </div>
    </main>

    <!-- SITE FOOTER -->
    <load src="/src/components/footer.html" />
  </div>

  <!-- GIỮ NGUYÊN: SEARCH OVERLAY -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-overlay__background js-search-close"></div>
    <div class="search-overlay__container">
      <div class="search-overlay__header">
        <div class="search-overlay__search-box">
          <svg class="search-overlay__search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input class="search-overlay__input js-search-overlay-input" type="text"
            placeholder="Tìm kiếm sản phẩm, danh mục..." aria-label="Tìm kiếm trong cửa hàng" />
        </div>
        <button class="search-overlay__close js-search-close" type="button" aria-label="Đóng tìm kiếm">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="search-overlay__content">
        <div class="search-overlay__row">
          <div class="search-overlay__left-col">
            <div class="search-section">
              <h3 class="search-section__title">Tìm kiếm gần đây</h3>
              <div class="search-pills js-recent-searches"></div>
            </div>
            <div class="search-section">
              <h3 class="search-section__title">Xu hướng tìm kiếm</h3>
              <ol class="trending-list js-trending-searches"></ol>
            </div>
          </div>
          <div class="search-overlay__right-col">
            <div class="search-section">
              <h3 class="search-section__title">Tìm kiếm phổ biến</h3>
              <div class="popular-grid js-popular-categories"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/scripts/main.js"></script>
</body>

</html>
