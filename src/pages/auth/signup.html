<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Đăng ký</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body class="page-signin page-signin--mobile-stack">
  <main class="signin-stage" role="main" aria-label="Đăng ký tài khoản Velura">
    <img class="bg-texture" src="../../assets/images/bg-texture.png" alt="" aria-hidden="true" />
    <img class="product product--8" src="../../assets/images/image-8.png" alt="" aria-hidden="true" />
    <img class="product product--3" src="../../assets/images/image-3.png" alt="" aria-hidden="true" />
    <img class="product product--6" src="../../assets/images/image-6.png" alt="" aria-hidden="true" />
    <img class="product product--1" src="../../assets/images/image-1.png" alt="" aria-hidden="true" />
    <img class="product product--5" src="../../assets/images/image-5.png" alt="" aria-hidden="true" />
    <img class="product product--4" src="../../assets/images/image-4.png" alt="" aria-hidden="true" />
    <img class="brand-logo" src="../../assets/images/logo.png" alt="Velura" />

    <form class="login-card" action="./signin.html" method="get">
      <header class="login-card__head">
        <h1 class="login-card__title" style="margin-bottom: 8px;">Tạo tài khoản</h1>
        <p class="login-card__subtitle" style="margin-bottom: 24px;">Đăng ký để nhận được nhiều ưu đãi từ Velura</p>
      </header>

      <div class="fields">
        <div class="field">
          <label class="field__label" for="fullname">Họ và tên</label>
          <div class="field__control">
            <input class="field__input" type="text" id="fullname" name="fullname" placeholder="Nhập họ và tên của bạn" required />
          </div>
        </div>

        <div class="field" style="margin-top: 16px;">
          <label class="field__label" for="phone">Số điện thoại</label>
          <div class="field__control">
            <input class="field__input" type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại của bạn" required />
          </div>
        </div>

        <div class="field" style="margin-top: 16px;">
          <label class="field__label" for="email">Gmail</label>
          <div class="field__control">
            <input class="field__input" type="email" id="email" name="email" placeholder="example@gmail.com" required />
          </div>
        </div>

        <div class="field field--password" style="margin-top: 16px;">
          <label class="field__label" for="password">Mật khẩu</label>
          <div class="field__control">
            <input class="field__input" type="password" id="password" name="password" placeholder="Nhập mật khẩu (tối thiểu 8 ký tự)" minlength="8" required />
            <button class="field__toggle" type="button" aria-label="Hiển thị mật khẩu">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M1.37 7.77C2.84 5.33 5.19 3.33 8 3.33s5.16 2 6.63 4.44M8 10a2 2 0 100-4 2 2 0 000 4z" stroke="#6B635D" stroke-width="1.33" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>

        <div class="field field--password" style="margin-top: 16px;">
          <label class="field__label" for="password-confirm">Xác nhận mật khẩu</label>
          <div class="field__control">
            <input class="field__input" type="password" id="password-confirm" name="password_confirm" placeholder="Xác nhận mật khẩu" minlength="8" required />
            <button class="field__toggle" type="button" aria-label="Hiển thị mật khẩu">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M1.37 7.77C2.84 5.33 5.19 3.33 8 3.33s5.16 2 6.63 4.44M8 10a2 2 0 100-4 2 2 0 000 4z" stroke="#6B635D" stroke-width="1.33" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>

      <button class="btn btn--login" type="submit" style="margin-top: 32px;">Đăng ký</button>

      <p class="signup" style="margin-top: 32px;">Đã có tài khoản? <a href="./signin.html">Đăng nhập ngay</a></p>
    </form>
  </main>
  <script type="module" src="../../scripts/main.js"></script>
</body>
</html>
