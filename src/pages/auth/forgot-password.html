<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Quên mật khẩu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body class="page-signin page-signin--mobile-stack">
  <main class="signin-stage" role="main" aria-label="Quên mật khẩu Velura">
    <img class="bg-texture" src="../../assets/images/bg-texture.png" alt="" aria-hidden="true" />
    <img class="product product--8" src="../../assets/images/image-8.png" alt="" aria-hidden="true" />
    <img class="product product--3" src="../../assets/images/image-3.png" alt="" aria-hidden="true" />
    <img class="product product--6" src="../../assets/images/image-6.png" alt="" aria-hidden="true" />
    <img class="product product--1" src="../../assets/images/image-1.png" alt="" aria-hidden="true" />
    <img class="product product--5" src="../../assets/images/image-5.png" alt="" aria-hidden="true" />
    <img class="product product--4" src="../../assets/images/image-4.png" alt="" aria-hidden="true" />
    <img class="brand-logo" src="../../assets/images/logo.png" alt="Velura" />

    <form class="login-card" action="../checkout/otp-verify.html" method="get">
      <header class="login-card__head">
        <h1 class="login-card__title" style="margin-bottom: 8px;">Quên mật khẩu?</h1>
        <p class="login-card__subtitle" style="margin-bottom: 24px;">Nhập số điện thoại hoặc email đăng ký để khôi phục mật khẩu của bạn.</p>
      </header>

      <div class="fields">
        <div class="field">
          <label class="field__label" for="identity">Số điện thoại hoặc Email</label>
          <div class="field__control">
            <input class="field__input" type="text" id="identity" name="identity" placeholder="Nhập SĐT hoặc email của bạn" required />
          </div>
        </div>
      </div>

      <button class="btn btn--login" type="submit" style="margin-top: 32px;">Gửi mã xác minh</button>

      <p class="signup" style="margin-top: 32px;">
        <a href="./signin.html" style="display: inline-flex; align-items: center; gap: 8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Quay lại đăng nhập
        </a>
      </p>
    </form>
  </main>
  <script type="module" src="../../scripts/main.js"></script>
</body>
</html>
